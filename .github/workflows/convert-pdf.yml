name: Convert Markdown to PDF

on:
  push:
    branches: [main]
  workflow_dispatch:  # 也可以手動觸發

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install Pandoc & XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-recommended texlive-latex-extra

      - name: Install BiauKai font
        run: |
          mkdir -p ~/.local/share/fonts
          cp fonts/BiauKai.ttc ~/.local/share/fonts/
          fc-cache -fv
          # 驗證字型可用
          fc-list | grep -i "biau" || echo "WARNING: BiauKai font not detected"

      - name: Convert 共通性 to PDF
        run: |
          mkdir -p pdf/共通性
          cd 共通性
          for f in *.md; do
            echo "Converting: $f"
            pandoc "$f" -o "../pdf/共通性/${f%.md}.pdf" \
              --pdf-engine=xelatex \
              -V mainfont="BiauKai" \
              -V geometry:margin=2cm \
              -V CJKmainfont="BiauKai" \
              --resource-path=. \
              || echo "⚠️ FAILED: $f"
          done

      - name: Convert 活動績效 to PDF
        run: |
          mkdir -p pdf/活動績效
          cd 活動績效
          for f in *.md; do
            echo "Converting: $f"
            pandoc "$f" -o "../pdf/活動績效/${f%.md}.pdf" \
              --pdf-engine=xelatex \
              -V mainfont="BiauKai" \
              -V geometry:margin=2cm \
              -V CJKmainfont="BiauKai" \
              --resource-path=. \
              || echo "⚠️ FAILED: $f"
          done

      - name: Convert 簡報 to PDF
        run: |
          mkdir -p pdf/簡報
          cd 簡報
          for f in *.md; do
            echo "Converting: $f"
            pandoc "$f" -o "../pdf/簡報/${f%.md}.pdf" \
              --pdf-engine=xelatex \
              -V mainfont="BiauKai" \
              -V geometry:margin=2cm \
              -V CJKmainfont="BiauKai" \
              --resource-path=. \
              || echo "⚠️ FAILED: $f"
          done

      - name: List generated PDFs
        run: |
          echo "=== Generated PDFs ==="
          find pdf -name "*.pdf" -exec ls -lh {} \;
          echo "Total: $(find pdf -name '*.pdf' | wc -l) files"

      - name: Deploy to pdf branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pdf
          publish_branch: pdf
          commit_message: "📄 Auto-generated PDFs from ${{ github.sha }}"
